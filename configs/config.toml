[data]
kaggle_raw_data_path = 'data/raw/autos.csv'
scraped_raw_data_path = 'data/raw/cars_dataset.csv'
merged_data_path = 'data/interim/merged_data.csv'
clean_data_path = 'data/processed/clean_data.csv'
processed_data_path = 'data/processed/features.csv'
validation_report_path = 'reports/results/validation_report'

[features]
features_columns = [
    "power",
    "kilometer",
    "vehicleAge",
    "kmPerYear",
    "km_power_ratio",
    "log_km",
    "brand_freq",
    "model_freq",
]
categorical_columns = [
    "vehicleType",
    "gearbox",
    "fuelType",
    "seller",
    "dataSource",
]
numerical_columns = [
    "power",
    "kilometer",
    "vehicleAge",
    "kmPerYear",
    "km_power_ratio",
    "log_km",
    "brand_freq",
    "model_freq",
]
drop_columns = ["brand", "model", "yearOfRegistration", "price", "price_tier"]

[features.selection]
strategy = 'xgboost'
threshold = 0.01
k = 20
report_path = 'reports/feature_importance_report.txt'
selected_features_path = 'reports/selected_features.txt'

[models]
results_path = 'reports/model_comparison.csv'
best_model_path = 'reports/best_model.json'
selection_report_path = 'reports/model_selection_report.txt'
experiment_name = 'used_car_price_tier'
mlflow_tracking_uri = 'http://127.0.0.1:5000'